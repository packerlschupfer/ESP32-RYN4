; RYN4 Basic Example
; Simple demonstration of RYN4 relay control library

[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32dev
framework = arduino
lib_ldf_mode = deep+
lib_deps =
    symlink://../..
    https://github.com/packerlschupfer/esp32ModbusRTU.git
    https://github.com/packerlschupfer/ESP32-ModbusDevice.git
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3
    -I$PROJECT_LIBDEPS_DIR/$PIOENV/esp32ModbusRTU/src
