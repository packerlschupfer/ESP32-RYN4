; RYN4 DELAY Command Timing Test
;
; Minimal example to test DELAY command timing and readback behavior

[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32dev
framework = arduino
lib_ldf_mode = deep+
lib_deps =
    symlink://../..
    https://github.com/packerlschupfer/esp32ModbusRTU.git
    https://github.com/packerlschupfer/ESP32-ModbusDevice.git
build_flags =
    -std=gnu++11
    -D ARDUINO_USB_MODE=0
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D LOG_MODE_DEBUG_SELECTIVE=1
    -D RYN4_LOG_LEVEL=3
    -D MODBUS_DEBUG=1
    -I$PROJECT_LIBDEPS_DIR/$PIOENV/esp32ModbusRTU/src
